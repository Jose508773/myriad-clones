<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Sandbox</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>API Sandbox</h1>
      <p>Click a button below to fetch backend data</p>
    </header>

    <div class="actions">
    </div>

    <div id="addUserContainer">
      <input type="text" id="nameInput" placeholder="Name">
      <input type="number" id="ageInput" placeholder="Age">
      <button id="sendUsers" class="btn">Add User</button>
    </div>

    <div id="specialIdUsersContainer">
      <input type="text" id="userIdInput" placeholder="name">
      <input type="number" id="userAgeInput" placeholder="age">
      <button id="sendSpecialIdUsers" class="btn">Add User with Random ID</button>
    </div>

    <div id="searchIdContainer">
      <input type="number" id="searchIdInput" placeholder="Enter User ID">
      <button id="btnSearchById" class="btn">Get User by ID</button>
    </div>

    <!-- ──────────────── Workers Section ──────────────── -->
    <div class="section-title">Workers (Supabase DB)</div>

    <div class="actions">
      <button id="btnGetWorkers" class="btn primary-btn">Get All Workers</button>
    </div>

    <div class="form-container">
      <h3>Add new Worker</h3>
      <div class="grid-form">
        <input type="text" id="workerName" placeholder="Name">
        <input type="number" id="workerAge" placeholder="Age">
        <input type="number" step="0.01" id="workerSalary" placeholder="Salary">
        <input type="text" id="workerPosition" placeholder="Position">
      </div>
      <button id="btnAddWorker" class="btn primary-btn" style="width: 100%;">Add Worker</button>
    </div>

    <div class="form-container">
      <h3>Manage Worker by ID</h3>
      <input type="text" id="workerId" placeholder="Worker ID (UUID)">
      <div class="grid-form" style="margin-top: 0.75rem;">
        <input type="text" id="editWorkerName" placeholder="New Name">
        <input type="number" id="editWorkerAge" placeholder="New Age">
        <input type="number" step="0.01" id="editWorkerSalary" placeholder="New Salary">
        <input type="text" id="editWorkerPosition" placeholder="New Position">
      </div>
      <div class="btn-group">
        <button id="btnGetWorker" class="btn">Get Worker</button>
        <button id="btnUpdateWorker" class="btn">Update Worker</button>
        <button id="btnDeleteWorker" class="btn danger-btn">Delete Worker</button>
      </div>
    </div>

    <div class="result-container">
      <div class="result-header">
        <span>Response Output</span>
        <span id="status" class="status-badge">Idle</span>
      </div>
      <pre id="output">{}</pre>
    </div>
  </div>

  <!-- JS Logic -->
  <script src="main.js"></script>
</body>

</html>
